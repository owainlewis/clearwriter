# Cloud Build pipeline for PAIR — triggered on push to main.
# Builds the image from the Dockerfile, pushes it to Artifact Registry, and
# deploys it to the existing Cloud Run service. Cloud Run keeps the service's
# env vars, secrets, and runtime service account from the previous revision,
# and migrations run on boot via bin/docker-entrypoint (db:prepare).
steps:
  - id: build
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - ${_IMAGE}:$SHORT_SHA
      - -t
      - ${_IMAGE}:latest
      - .

  - id: push
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - ${_IMAGE}

  - id: deploy
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE}
      - --image=${_IMAGE}:$SHORT_SHA
      - --region=${_REGION}
      - --quiet

images:
  - ${_IMAGE}:$SHORT_SHA
  - ${_IMAGE}:latest

substitutions:
  _REGION: europe-west1
  _SERVICE: pair
  _IMAGE: europe-west1-docker.pkg.dev/use-pair-ai/cloud-run-source-deploy/pair

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8
